image: ubuntu:22.04

tasks:
  - name: Setup LineageOS 17.1
    init: |
      echo "=== Installing dependencies ==="
      apt-get update
      apt-get install -y bc bison build-essential ccache curl flex \
        g++-multilib gcc-multilib git gnupg gperf imagemagick \
        lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool \
        libncurses5-dev libsdl1.2-dev libssl-dev libwxgtk3.0-dev \
        libxml2 libxml2-utils lzop pngcrush rsync schedtool \
        squashfs-tools xsltproc zip zlib1g-dev openjdk-11-jdk python3 \
        wget unzip jq

      echo "=== Installing repo ==="
      mkdir -p ~/bin
      curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
      chmod a+x ~/bin/repo
      export PATH="$HOME/bin:$PATH"

      echo "=== Configuring ccache ==="
      ccache -M 30G

      echo "=== Initializing repository ==="
      git config --global user.name "Builder"
      git config --global user.email "builder@gitpod.io"
      
      mkdir -p /workspace/lineage
      cd /workspace/lineage
      
      repo init -u https://github.com/LineageOS/android.git \
        -b lineage-17.1 \
        --depth=1 \
        -g all,-notdefault,-device,-kernel,-vendor

    command: |
      export PATH="$HOME/bin:$PATH"
      cd /workspace/lineage

      echo "=== Downloading device tree ==="
      git clone --depth=1 https://github.com/Potato-is-rotten/lineage-ienglish-9011.git device/ienglish/ienglish_9011
      
      echo "=== Downloading proprietary files ==="
      echo "NOTE: You need to manually upload proprietary files!"
      echo "See: https://github.com/Potato-is-rotten/lineage-ienglish-9011/blob#proprietary-files"
      echo ""
      echo "To upload files:"
      echo "1. Create a GitHub Release with the proprietary files"
      echo "2. Get the download URL from the release"
      echo "3. Create .gitpod/proprietary-url file with the URL"
      echo "4. The files will be auto-downloaded on build start"
      echo ""
      if [ -f .gitpod/proprietary-url ]; then
        echo "=== Downloading proprietary files from GitHub Release ==="
        PROPRIETARY_URL=$(cat .gitpod/proprietary-url)
        wget -q "$PROPRIETARY_URL" -O proprietary.zip
        unzip -o proprietary.zip -d vendor/ienglish/ienglish_9011/proprietary/
        rm -f proprietary.zip
      fi
      
      echo "=== Downloading prebuilt kernel ==="
      if [ -f .gitpod/kernel-url ]; then
        echo "=== Downloading kernel through GitHub Release ==="
        KERNEL_URL=$(cat .gitpod/kernel-url)
        wget -q "$KERNEL_URL" -O kernel.zip
        unzip -o kernel.zip -d device/ienglish/ienglish_9011/prebuilt/kernel/
        rm -f kernel.zip
      fi
      
      echo "=== Starting build ==="
      source build/envsetup.sh
      breakfast ienglish_9011
      make -j$(nproc) systemimage 2>&1 | tee systemimage

      echo "=== Build complete! ==="
      ls -la out/target/product/ienglish_9011/

vscode:
  extensions:
    - ms-vscode.cpptools

workspaceLocation: /workspace/lineage
