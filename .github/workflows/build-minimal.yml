name: Build LineageOS 16 (Optimized)

on:
  workflow_dispatch:

env:
  DEVICE: ienglish_9011
  BRANCH: lineage-16.0

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          df -h

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libwxgtk3.0-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools xsltproc zip \
            zlib1g-dev openjdk-8-jdk

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: ccache-${{ env.BRANCH }}
          restore-keys: ccache-

      - name: Initialize repo (minimal)
        run: |
          mkdir -p ~/los
          cd ~/los
          git config --global user.name "Build"
          git config --global user.email "build@local"
          
          # 使用最小化manifest
          repo init -u https://github.com/LineageOS/android.git \
            -b ${{ env.BRANCH }} \
            --depth=1 \
            -g all,-notdefault,-device,-kernel,-vendor

      - name: Sync source (minimal)
        run: |
          cd ~/los
          
          # 只同步核心仓库，减少存储
          repo sync -c -j4 \
            build/make \
            build/soong \
            external/clang \
            external/compiler-rt \
            frameworks/base \
            frameworks/native \
            hardware/interfaces \
            hardware/qcom-caf/common \
            packages/apps/Settings \
            packages/services/Telephony \
            prebuilts/clang/host/linux-x86 \
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            prebuilts/build-tools \
            system/core \
            system/netd \
            system/sepolicy \
            system/vold \
            vendor/lineage

      - name: Setup device tree
        run: |
          cd ~/los
          
          # 创建设备目录
          mkdir -p device/ienglish/ienglish_9011
          
          # 写入配置文件
          cat > device/ienglish/ienglish_9011/AndroidProducts.mk << 'EOF'
          PRODUCT_MAKEFILES := $(LOCAL_DIR)/ienglish_9011.mk
          EOF
          
          cat > device/ienglish/ienglish_9011/ienglish_9011.mk << 'EOF'
          $(call inherit-product, $(SRC_TARGET_DIR)/product/full_base.mk)
          PRODUCT_NAME := ienglish_9011
          PRODUCT_DEVICE := ienglish_9011
          PRODUCT_BRAND := iEnglish
          PRODUCT_MODEL := iEnglish 9011
          EOF
          
          cat > device/ienglish/ienglish_9011/BoardConfig.mk << 'EOF'
          TARGET_ARCH := arm
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := armeabi-v7a
          TARGET_CPU_ABI2 := armeabi
          TARGET_CPU_VARIANT := cortex-a53
          TARGET_USES_64_BIT_BINDER := true
          TARGET_BOARD_PLATFORM := mt6739
          BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472
          EOF

      - name: Build system.img only
        run: |
          cd ~/los
          source build/envsetup.sh
          breakfast ${{ env.DEVICE }}
          
          # 只编译system.img，减少时间和存储
          make -j$(nproc) systemimage

      - name: Upload system.img
        uses: actions/upload-artifact@v3
        with:
          name: system-img-${{ env.DEVICE }}
          path: ~/los/out/target/product/${{ env.DEVICE }}/system.img
          retention-days: 3

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/los
          df -h
